name: Feature request
description: Suggest a new capability or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. The more concretely you describe the problem and use case, the easier it is to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do, and why is the current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: What would you like claude-mux to do? Be specific about commands, flags, or behaviors.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one is preferable
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps — examples, mockups, related tools, etc.
    validations:
      required: false
